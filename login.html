<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VeganBox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
            margin: 0;
            padding: var(--spacing-md);
            font-family: 'Inter', sans-serif;
            transition: var(--transition-normal);
            color: var(--neutral-800);
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        [data-theme="dark"] .auth-container {
            border-color: var(--neutral-700);
            background: #111827;
        }

        .header-controls-floating {
            position: fixed;
            top: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 100;
            display: flex;
            gap: var(--spacing-sm);
        }

        .logo-container {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .logo-container a {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo-container img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--neutral-700);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            height: 52px;
            padding: 0 1rem;
            border: 2px solid var(--neutral-300) !important;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            background: var(--surface);
            color: var(--neutral-900);
            transition: all 0.2s ease;
        }

        .form-control::placeholder {
            color: var(--neutral-400);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .btn-primary {
            height: 52px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: var(--spacing-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: none;
            border-radius: var(--radius-lg);
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: var(--transition-normal);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: var(--spacing-xl) 0;
            color: var(--neutral-500);
            font-size: 0.75rem;
            font-weight: 600;
            border: none !important;
            height: auto !important;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--neutral-300);
        }

        .divider:not(:empty)::before {
            margin-right: 1rem;
        }

        .divider:not(:empty)::after {
            margin-left: 1rem;
        }

        .social-btns {
            display: grid;
            gap: var(--spacing-sm);
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            height: 52px;
            border: 2px solid var(--neutral-200);
            border-radius: var(--radius-lg);
            background: var(--surface);
            color: var(--neutral-800);
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            margin-bottom: var(--spacing-md);
        }

        .social-btn:hover {
            background-color: var(--neutral-100);
            border-color: var(--neutral-300);
        }

        .auth-footer {
            text-align: center;
            margin-top: var(--spacing-xl);
            font-size: 0.875rem;
            color: var(--neutral-600);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        [data-theme="dark"] .divider::before,
        [data-theme="dark"] .divider::after {
            border-color: var(--neutral-700);
        }
    </style>
</head>

<body class="auth-page">
    <div class="header-controls-floating">
        <button id="rtl-toggle" class="btn-icon fw-bold text-xs" aria-label="Toggle RTL">RTL</button>
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="auth-container animate-fadeIn">
        <div class="logo-container">
            <a href="index.html"><img src="favicon.png" alt="VeganBox"> <span>VeganBox</span></a>
        </div>

        <div class="text-center mb-xl">
            <h1 class="text-2xl text-neutral-900 mb-xs">Member Login</h1>
            <p class="text-sm text-neutral-600">Sign in to manage your healthy meal plans.</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-group d-flex justify-content-between align-items-center gap-sm mt-md login-options">
                <div class="d-flex align-items-center gap-sm">
                    <input type="checkbox" id="remember" style="width: 18px; height: 18px; accent-color: var(--primary);">
                    <label for="remember" style="margin-bottom: 0; text-transform: none; font-weight: 500; color: var(--neutral-600); cursor: pointer;">Stay logged in</label>
                </div>
                <a href="#" class="text-xs text-primary fw-bold" style="text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-primary">Login</button>
        </form>

        <div class="divider">OR CONTINUE WITH</div>

        <div class="social-btns">
            <button class="social-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18"
                    alt="Google">
                Google
            </button>
            <button class="social-btn">
                <i class="fab fa-apple" style="color: #000000; font-size: 1.25rem;"></i>
                Apple
            </button>
            <button class="social-btn">
                <i class="fab fa-facebook" style="color: #1877F2; font-size: 1.25rem;"></i>
                Facebook
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Join VeganBox</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('login-form')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-primary');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Logging in...';
            btn.disabled = true;
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        });
    </script>
</body>

</html>

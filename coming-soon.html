<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | VeganBox - Launching Freshness</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.pexels.com/photos/1435737/pexels-photo-1435737.jpeg'); background-size: cover; background-position: center; min-height: 100vh; color: white;">

    <div class="coming-soon-container animate-fadeIn">
        <div class="logo mb-xl" style="font-size: 3rem; color: white;">
            <i class="fas fa-leaf"></i>
            <span>VeganBox</span>
        </div>
        <h1 class="text-3xl mb-md">Something <span style="color: var(--secondary);">Vibrant</span> is Sprouting!</h1>
        <p class="text-lg mb-xl max-w-600 mx-auto">We're getting our kitchen ready for the freshest meal subscription service in town. Launching in early Summer 2026.</p>

        <!-- Countdown Placeholder -->
        <div class="grid grid-4 countdown-grid mb-xl mx-auto" style="max-width: 500px;">
            <div class="countdown-item card bg-white-trans">
                <span class="text-2xl fw-bold">45</span>
                <p class="text-sm">Days</p>
            </div>
            <div class="countdown-item card bg-white-trans">
                <span class="text-2xl fw-bold">12</span>
                <p class="text-sm">Hours</p>
            </div>
            <div class="countdown-item card bg-white-trans">
                <span class="text-2xl fw-bold">34</span>
                <p class="text-sm">Mins</p>
            </div>
            <div class="countdown-item card bg-white-trans">
                <span class="text-2xl fw-bold">18</span>
                <p class="text-sm">Secs</p>
            </div>
        </div>

        <div class="subscribe-form mx-auto" style="max-width: 450px;">
            <p class="mb-md fw-semibold">Notify me when we launch:</p>
            <form id="notify-form" class="d-flex gap-sm">
                <input type="email" class="form-control" placeholder="Enter your email" required style="border-radius: var(--radius-full);">
                <button type="submit" class="btn btn-secondary" style="background-color: var(--secondary);">Notify Me</button>
            </form>
        </div>

        <div class="social-links mt-xl">
            <a href="#" class="btn-icon circle-outline" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="btn-icon circle-outline" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="btn-icon circle-outline" aria-label="Pinterest"><i class="fab fa-pinterest-p"></i></a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('notify-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Thank you! We will notify you when we sprout.');
        });
    </script>
</body>
</html>

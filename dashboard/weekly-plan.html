<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Plan | Veganova Vegan Meal Service</title>
    <link rel="icon" type="image/svg+xml" href="../assets/img/logo-icon.svg">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary-bg: #f8fafc;
            --sidebar-bg: #ffffff;
            --accent-green: #14532d;
            --vibrant-lime: #84cc16;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            transition: var(--transition);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 2rem;
            z-index: 1000;
        }

        .sidebar-brand img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .brand-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-green);
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.875rem 1.25rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 12px;
            transition: var(--transition);
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(132, 204, 22, 0.1);
            color: var(--vibrant-lime);
        }

        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 2rem 3rem;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body class="light-mode">

    <aside class="sidebar">
        <a href="../index.html" class="sidebar-brand">
            <img src="../assets/img/logo-icon.svg" class="v-logo-img" style="width: 32px; height: 32px;" alt="Veganova Icon">
            <span class="brand-name">Veganova</span>
        </a>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="../index.html" class="nav-link">
                    <i data-lucide="layout-dashboard"></i> Overview
                </a>
            </li>
            <li class="nav-item">
                <a href="weekly-plan.html" class="nav-link active">
                    <i data-lucide="calendar"></i> Weekly Plan
                </a>
            </li>
            <li class="nav-item">
                <a href="deliveries.html" class="nav-link">
                    <i data-lucide="truck"></i> Deliveries
                </a>
            </li>
            <li class="nav-item">
                <a href="favorites.html" class="nav-link">
                    <i data-lucide="heart"></i> Saved Meals
                </a>
            </li>
            <li class="nav-item">
                <a href="preferences.html" class="nav-link">
                    <i data-lucide="settings"></i> Account Settings
                </a>
            </li>
            <li class="nav-item mt-5 pt-5 border-t">
                <a href="../index.html" class="nav-link text-danger">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <h1 class="mb-5">Weekly Plan</h1>
        <div class="row g-4">
            <div class="col-12 py-5 text-center bg-white rounded-[40px] shadow-sm">
                <i data-lucide="calendar-check-2" class="w-24 h-24 text-secondary mb-4 opacity-50"></i>
                <h2>Plan Your Meals for Next Week</h2>
                <p class="text-muted mb-5">Access the full schedule and select 14 fresh meals to be delivered on Monday.</p>
                <a href="../meals.html" class="btn btn-primary rounded-pill px-5 py-3 font-bold shadow-lg shadow-success/20">Go to Menu Selection</a>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Theme Toggle Logic for Dashboard
        const themeBtn = document.querySelector('.theme-toggle');
        const sunIcon = document.querySelector('.sun-icon');
        const moonIcon = document.querySelector('.moon-icon');
        const body = document.body;

        // Load saved theme
        const savedTheme = localStorage.getItem('v-prep-theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            if(sunIcon) sunIcon.classList.remove('d-none');
            if(moonIcon) moonIcon.classList.add('d-none');
        }

        if(themeBtn) {
            themeBtn.addEventListener('click', () => {
                body.classList.toggle('dark');
                const isDark = body.classList.contains('dark');
                localStorage.setItem('v-prep-theme', isDark ? 'dark' : 'light');
                
                if (isDark) {
                    if(sunIcon) sunIcon.classList.remove('d-none');
                    if(moonIcon) moonIcon.classList.add('d-none');
                } else {
                    if(sunIcon) sunIcon.classList.remove('d-none'); // wait, should add d-none
                    if(sunIcon) sunIcon.classList.add('d-none');
                    if(moonIcon) moonIcon.classList.remove('d-none');
                }
            });
        }
    </script>
</body>
</html>

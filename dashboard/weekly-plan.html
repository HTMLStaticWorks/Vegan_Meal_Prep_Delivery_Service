<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Plan | VeganMeal Vegan Meal Service</title>
    <link rel="icon" type="image/svg+xml" href="../assets/img/logo-icon.svg">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary-bg: #f8fafc;
            --sidebar-bg: #ffffff;
            --accent-green: #10B981;
            --vibrant-lime: #84cc16;
            --text-main: #0f172a;
            --text-muted: #475569; /* Slate-600 for visibility */
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark {
            --primary-bg: #0f172a;
            --sidebar-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #cbd5e1; /* Slate-300 for high contrast */
            background-color: var(--primary-bg);
            color: var(--text-main);
        }

        /* Generic Overrides for Contrast */
        .text-muted {
            color: var(--text-muted) !important;
        }

        .bg-primary {
            background-color: var(--accent-green) !important;
        }

        .text-success {
            color: var(--accent-green) !important;
        }

        .dark .text-success {
            color: var(--vibrant-lime) !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            transition: var(--transition);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
        }

        /* Sidebar Styles */
        .sidebar { transform: translateX(-100%); z-index: 5000;  z-index: 5000; overflow-y: auto; 
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 2rem;
            z-index: 1000;
            transition: var(--transition);
        }

        .dark .sidebar { transform: translateX(-100%); z-index: 5000;  z-index: 5000; overflow-y: auto; 
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-brand img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .brand-name {
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--accent-green);
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .dark .brand-name {
            color: white;
        }

        .nav-menu { margin-top: 1.5rem; 
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.875rem 1.25rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem; border-radius: 12px; transition: var(--transition);
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(20, 83, 45, 0.05);
            color: var(--accent-green);
        }

        .dark .nav-link:hover, .dark .nav-link.active {
            background-color: rgba(132, 204, 22, 0.1);
            color: var(--vibrant-lime);
        }

        .nav-link i {
            width: 20px;
            height: 20px;
        }

        /* Main Content */
        .main-content {
            margin-left: 0 !important;
            flex-grow: 1;
            padding: 2rem 3rem;
            transition: var(--transition);
        }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem;
            background: white;
            border-radius: 16px;
            padding-right: 1.25rem;
            box-shadow: var(--card-shadow);
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            object-fit: cover;
        }

        .dark .user-profile {
            background: var(--sidebar-bg);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }
        .dark .card { background: var(--sidebar-bg); border: 1px solid rgba(255,255,255,0.05); }

        /* Responsive */
        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); z-index: 5000;  z-index: 5000; overflow-y: auto; 
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 1.5rem;
            }
        }
    
        .table-responsive th { 
            white-space: nowrap; 
            font-size: 10px; 
            padding-right: 1rem !important;
        }
        @media (max-width: 768px) {
            .top-navbar {
                position: sticky;
                top: 0;
                background: var(--primary-bg);
                z-index: 1001;
                margin-bottom: 2rem;
                padding: 1rem 0;
            }
        }
            </style>
</head>
<body class="light-mode">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header d-flex justify-content-end align-items-center mb-4">
            <button class="btn btn-light  bg-light-subtle close-sidebar p-2 rounded-circle" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <i data-lucide="layout-dashboard"></i> Overview
                </a>
            </li>
            <li class="nav-item">
                <a href="weekly-plan.html" class="nav-link active">
                    <i data-lucide="calendar"></i> Weekly Meals
                </a>
            </li>
            
            <li class="nav-item">
                <a href="favorites.html" class="nav-link">
                    <i data-lucide="heart"></i> Saved Meals
                </a>
            </li>
            <li class="nav-item">
                <a href="preferences.html" class="nav-link">
                    <i data-lucide="settings"></i> Preferences
                </a>
            </li>
            <li class="nav-item mt-5 pt-5 border-t">
                <a href="../index.html" class="nav-link text-danger">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </li>
            <li class="nav-item"><hr class="my-3 opacity-10"></li>
            <li class="nav-item d-flex gap-2 px-3 mt-3">
                <button class="rtl-toggle btn btn-light flex-1 py-2 text-xs font-bold" title="Toggle RTL"><span>RTL</span></button>
                <button class="theme-toggle btn btn-light flex-1 py-2" title="Toggle Theme">
                    <i data-lucide="sun" class="sun-icon text-warning d-none"></i>
                    <i data-lucide="moon" class="moon-icon text-primary"></i>
                </button>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="container-fluid">
            <header class="top-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button id="sidebar-toggle" class="btn btn-light  bg-light-subtle dark:bg-slate-800 border-0 p-2 rounded-circle" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="menu"></i>
                    </button>
                    <div>
                        <h1 class="mb-1">Weekly Plan</h1>
                        <p class="text-muted small mb-0 d-none d-sm-block">Schedule and manage your meals for the upcoming week.</p>
                    </div>
                </div>
                
                <div class="nav-actions align-items-center">
                    <div class="user-profile">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop" class="user-avatar" alt="User">
                        <div class="d-none d-md-block">
                            <h6 class="mb-0 small font-bold">Member</h6>
                            <span class="text-muted text-[10px] uppercase font-bold tracking-widest">Premium Plan</span>
                        </div>
                    </div>
                </div>
            </header>
        <div class="row g-4">
            <div class="col-12 py-5 text-center bg-white rounded-[40px] shadow-sm">
                <i data-lucide="calendar-check-2" class="w-24 h-24 text-secondary mb-4 opacity-50"></i>
                <h2>Plan Your Meals for Next Week</h2>
                <p class="text-muted mb-5">Access the full schedule and select 14 fresh meals to be delivered on Monday.</p>
                <a href="../meals.html" class="btn btn-primary rounded-pill px-5 py-3 font-bold shadow-lg shadow-success/20">Go to Menu Selection</a>
            </div>
        </div>
        </div>
    </main>

        <script>
        lucide.createIcons();

        // Theme Toggle Logic for Dashboard
        const themeToggleBtns = document.querySelectorAll('.theme-toggle');
        const sunIcons = document.querySelectorAll('.sun-icon');
        const moonIcons = document.querySelectorAll('.moon-icon');
        const html = document.documentElement;

        const updateIcons = (isDark) => {
            sunIcons.forEach(icon => {
                if (isDark) icon.classList.remove('d-none');
                else icon.classList.add('d-none');
            });
            moonIcons.forEach(icon => {
                if (isDark) icon.classList.add('d-none');
                else icon.classList.remove('d-none');
            });
        };

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            html.classList.add('dark');
            updateIcons(true);
        }

        themeToggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                html.classList.toggle('dark');
                const isDark = html.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateIcons(isDark);
            });
        });

        // RTL Toggle for Dashboard
        const rtlBtns = document.querySelectorAll('.rtl-toggle');
        const docHtml = document.documentElement;
        
        const savedRTL = localStorage.getItem('rtl');
        if (savedRTL === 'true') {
            docHtml.setAttribute('dir', 'rtl');
            rtlBtns.forEach(btn => {
                const span = btn.querySelector('span');
                if (span) span.textContent = 'RTL';
            });
        }
    
        rtlBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const isRTL = docHtml.getAttribute('dir') === 'rtl';
                if (isRTL) {
                    docHtml.removeAttribute('dir');
                    localStorage.setItem('rtl', 'false');
                    rtlBtns.forEach(b => {
                        const s = b.querySelector('span');
                        if (s) s.textContent = 'RTL';
                    });
                } else {
                    docHtml.setAttribute('dir', 'rtl');
                    localStorage.setItem('rtl', 'true');
                    rtlBtns.forEach(b => {
                        const s = b.querySelector('span');
                        if (s) s.textContent = 'RTL';
                    });
                }
            });
        });

        // Sidebar Toggle - Drawer mode
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('sidebar');
        if(sidebarToggle && sidebar) {
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('show');
            });

            const closeBtn = sidebar.querySelector('.close-sidebar');
            if(closeBtn) {
                closeBtn.addEventListener('click', () => {
                    sidebar.classList.remove('show');
                });
            }

            // Close sidebar when clicking outside
            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                    sidebar.classList.remove('show');
                }
            });
        }
    </script>
</body>
</html>

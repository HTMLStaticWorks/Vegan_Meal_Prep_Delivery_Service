<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Veganova Vegan Meal Service</title>
    <link rel="icon" type="image/svg+xml" href="../assets/img/logo-icon.svg">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#14532d',
                        secondary: '#84cc16',
                        accent: '#f5f5f4',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased text-slate-900 transition-colors duration-300 min-h-screen relative flex items-center justify-center p-6">

    <!-- Premium Blurred Background -->
    <div class="fixed inset-0 z-[-1]">
        <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=1600&fit=crop" class="w-full h-full object-cover scale-110 blur-xl brightness-50 dark:brightness-[0.3]" alt="Background">
        <div class="absolute inset-0 bg-primary/20 dark:bg-black/40"></div>
    </div>

    <!-- Centered Glassmorphism Card -->
    <div class="w-full max-w-[440px] bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-[3rem] shadow-2xl p-6 lg:p-8 relative overflow-hidden">
        
        <!-- Header Branding -->
        <div class="flex flex-col items-center text-center mb-6">
            <a href="../index.html" class="flex items-center gap-2 mb-4 group">
                <img src="../assets/img/logo-icon.svg" class="w-10 h-10 group-hover:rotate-12 transition-transform" alt="Veganova icon">
                <span class="text-2xl font-black font-heading tracking-tight text-primary dark:text-white">Veganova</span>
            </a>
            <h1 class="text-2xl font-black font-heading mb-2 dark:text-white tracking-tighter">Login</h1>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Log in to manage your sustainable food journey.</p>
        </div>

        <!-- Login Form -->
        <form action="../dashboard/index.html" class="space-y-4">
            <div class="space-y-3">
                <!-- Names Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- First Name -->
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 ml-2">First name</label>
                        <div class="relative group">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-secondary transition-colors"></i>
                            <input type="text" placeholder="John" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-secondary rounded-xl pl-12 pr-4 py-3 outline-none transition-all dark:text-white text-sm font-medium">
                        </div>
                    </div>

                    <!-- Last Name -->
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 ml-2">Last name</label>
                        <div class="relative group">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-secondary transition-colors"></i>
                            <input type="text" placeholder="Doe" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-secondary rounded-xl pl-12 pr-4 py-3 outline-none transition-all dark:text-white text-sm font-medium">
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 ml-2">Email address</label>
                    <div class="relative group">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-secondary transition-colors"></i>
                        <input type="email" required placeholder="name@example.com" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-secondary rounded-xl pl-12 pr-4 py-3 outline-none transition-all dark:text-white text-sm font-medium">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex items-center justify-between mb-1 px-2">
                        <label class="text-[10px] font-bold text-slate-400">Password</label>
                        <a href="#" class="text-[10px] font-bold text-primary dark:text-secondary hover:underline">Forgot?</a>
                    </div>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-secondary transition-colors"></i>
                        <input type="password" required placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-secondary rounded-xl pl-12 pr-4 py-3 outline-none transition-all dark:text-white text-sm font-medium">
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 px-2">
                <input type="checkbox" id="remember" class="w-4 h-4 accent-secondary rounded">
                <label for="remember" class="text-xs font-bold text-slate-500 dark:text-slate-400 cursor-pointer">Remember me for 30 days</label>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-secondary text-white py-3.5 rounded-xl font-bold text-sm transition-all shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
                Login <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>

            <div class="text-center">
                <p class="text-slate-500 dark:text-slate-400 font-medium">Don't have an account? <a href="signup.html" class="text-secondary font-black hover:underline underline-offset-4">Create one here</a></p>
            </div>
        </form>

        <!-- Close/Back Button -->
        <a href="../index.html" class="absolute top-4 right-4 md:top-8 md:right-8 p-3 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
        </a>
    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
